<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0a0a0f"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" stroke="#e8c547" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Checkmark base circle -->
  <circle cx="16" cy="16" r="7" fill="#e8c547" fill-opacity="0.12"/>
  <!-- Clock hand / task indicator -->
  <line x1="16" y1="10" x2="16" y2="16" stroke="#e8c547" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="19" stroke="#e8c547" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#e8c547"/>
  <!-- Small accent dots -->
  <circle cx="16" cy="6" r="1" fill="#e8c547" opacity="0.4"/>
  <circle cx="26" cy="16" r="1" fill="#e8c547" opacity="0.4"/>
  <circle cx="16" cy="26" r="1" fill="#e8c547" opacity="0.4"/>
  <circle cx="6" cy="16" r="1" fill="#e8c547" opacity="0.4"/>
</svg>
